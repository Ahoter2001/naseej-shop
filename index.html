<!DOCTYPE html>
<html lang="ar" const dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" const const content="width=device-width, initial-scale=1.0">
    <title>نسيج | نسيج براند هدوم رجالي مصري</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; color: #333; margin: 0; padding: 20px; text-align: center; }
        .product { border: 1px solid #ddd; padding: 15px; margin: 10px; display: inline-block; width: 200px; background: white; border-radius: 8px; }
        .price { color: #d32f2f; font-weight: bold; }
        .btn { background-color: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        .btn:hover { background-color: #555; }
        h1 { color: #000; }
        .hero { margin-bottom: 40px; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>نسيج</h1>
        <p>براند هدوم رجالي مصري، بنصمم قطع تلبس بثقة وتقعد معاك سنين.</p>
        <button class="btn">تسوق دلوقتي</button>
    </header>

    <section>
        <h2>الأكثر مبيعاً</h2>
        <div class="product">
            <h3>تيشيرت أساسي أبيض</h3>
            <p class="price">450 ج.م</p>
            <button class="btn">أضف للسلة</button>
        </div>
        <div class="product">
            <h3>هودي نسيج أسود</h3>
            <p class="price">950 ج.م</p>
            <button class="btn">أضف للسلة</button>
        </div>
        <div class="product">
            <h3>جاكيت بومبر أسود</h3>
            <p class="price">1650 ج.م</p>
            <button class="btn">أضف للسلة</button>
        </div>
    </section>

    <footer const style="margin-top: 50px; font-size: 0.8em; color: #777;">
        <p>© 2026 نسيج. كل الحقوق محفوظة.</p>
        <p>هذا الموقع نموذج تجريبي بدون نظام دفع حقيقي</p>
    </footer>
</body>
</html>
